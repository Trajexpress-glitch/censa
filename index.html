  <!-- Frozen-timeline guard: if CSS animations never advance (offscreen/throttled
       iframe, print, html-to-image capture), force content to its visible end-state. -->
  <script>
    (function () {
      function check(tries) {
        try {
          var a = document.getAnimations ? document.getAnimations() : [];
          if (a.length && a.every(function (x) { return (x.currentTime || 0) === 0; })) {
            var s = document.createElement('style');
            s.id = '__frozen-guard';
            s.textContent = '*{animation:none !important;} .animate-in{opacity:1 !important; transform:none !important;}';
            document.head.appendChild(s);
          } else if (tries < 6) {
            setTimeout(function () { check(tries + 1); }, 350);
          }
        } catch (e) {}
      }
      setTimeout(function () { check(0); }, 1200);
    })();
  </script>
